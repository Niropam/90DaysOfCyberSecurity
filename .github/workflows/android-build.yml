name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "calculator-app/**"
      - "calculator-app-android/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "calculator-app/**"
      - "calculator-app-android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional: create a GitHub release with this tag (e.g. v1.0.0) and attach the APK"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: calculator-app-android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-calculator-debug-apk
          path: calculator-app-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub release with APK
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: |
          cp calculator-app-android/app/build/outputs/apk/debug/app-debug.apk "omni-calculator-$TAG.apk"
          gh release create "$TAG" \
            "omni-calculator-$TAG.apk" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Omni Calculator $TAG" \
            --notes "Calculator app with date/time math, unit & currency converters, and live time/date/temperature widgets.

          **Install:** download \`omni-calculator-$TAG.apk\` below, open it on your Android phone (8.0+), and allow the install when prompted."
