name: Release Android APK

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build APK and create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: calculator-app-android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp calculator-app-android/app/build/outputs/apk/debug/app-debug.apk "omni-calculator-${{ github.ref_name }}.apk"

      - name: Create GitHub release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "omni-calculator-${{ github.ref_name }}.apk" \
            --repo "${{ github.repository }}" \
            --title "Omni Calculator ${{ github.ref_name }}" \
            --generate-notes \
            --notes "Calculator app with date/time math, unit & currency converters, and live time/date/temperature widgets.

          **Install:** download \`omni-calculator-${{ github.ref_name }}.apk\` below, open it on your Android phone (8.0+), and allow the install when prompted."
