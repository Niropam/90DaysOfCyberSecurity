name: Build PDF Studio APK

on:
  push:
    branches: [main, "claude/pdf-reader-**"]
    paths:
      - "pdf-reader/**"
      - "pdf-reader-android/**"
      - ".github/workflows/pdf-studio-android-build.yml"
  pull_request:
    paths:
      - "pdf-reader/**"
      - "pdf-reader-android/**"
      - ".github/workflows/pdf-studio-android-build.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional: create a GitHub release with this tag (e.g. pdf-studio-v1.0.0) and attach the APK"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: pdf-reader-android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-studio-debug-apk
          path: pdf-reader-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub release with APK
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: |
          cp pdf-reader-android/app/build/outputs/apk/debug/app-debug.apk "pdf-studio-$TAG.apk"
          gh release create "$TAG" \
            "pdf-studio-$TAG.apk" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "PDF Studio $TAG" \
            --notes "PDF reader & editor: edit document text, insert signatures (draw / type / upload), and rearrange pages from the sidebar menu. Runs fully offline.

          **Install:** download \`pdf-studio-$TAG.apk\` below, open it on your Android phone (8.0+), and allow the install when prompted."
